system:
  name: local_assertive_before
  domain: presenteeism_support
  intended_use:
    - self_observation
  mandatory_use: false
  clinical_governance: false

data:
  signals:
    - heart_rate
    - keyboard_rhythm
  processing: local
  retention: session
  identifiability: local_ephemeral

visibility:
  user: true
  manager: false
  teacher: false
  employer: false
  researcher: false

claims:
  - id: c1
    text: "High stress detected"
    type: psychological
    severity: C4
    source:
      - heart_rate
      - keyboard_rhythm

actions:
  - user_notification

controls:
  local_processing: true
  raw_data_deleted: true
  user_only: true
  non_assertive_output: false
  opt_out: full
