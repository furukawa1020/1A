system:
  name: local_non_assertive_after
  domain: presenteeism_support
  intended_use:
    - self_observation
  mandatory_use: false
  clinical_governance: false

data:
  signals:
    - keyboard_rhythm
  processing: local
  retention: session
  identifiability: local_ephemeral

visibility:
  user: true
  manager: false
  teacher: false
  employer: false
  researcher: false

claims:
  - id: c1
    text: "The work flow may have changed slightly"
    type: pattern
    severity: C2
    source:
      - keyboard_rhythm

actions:
  - user_notification

controls:
  local_processing: true
  raw_data_deleted: true
  user_only: true
  non_assertive_output: true
  opt_out: full
