<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRESENCE Employee App Demo</title>
  <link rel="stylesheet" href="../shared.css">
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">Runtime Rewrite Demo</p>
      <h1>Employee Self-Observation Pattern</h1>
      <p>The app proposes an assertive psychological claim. PRESENCE Guard rewrites it to a C2 non-assertive cue.</p>
    </header>

    <section class="panel focus">
      <h2>Rendered Output</h2>
      <p id="renderedOutput" class="large-output"></p>
    </section>

    <section class="panel">
      <h2>Decision</h2>
      <pre id="decisionLog"></pre>
    </section>
  </main>

  <script src="../../presence-sdk-js/src/presence-guard.js"></script>
  <script src="./main.js"></script>
</body>
</html>
