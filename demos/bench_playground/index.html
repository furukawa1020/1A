<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRESENCE Bench Playground</title>
  <link rel="stylesheet" href="../shared.css">
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">Public Reference Profile Playground</p>
      <h1>PRESENCE Bench</h1>
      <p>公開機能パターンから作ったreference profileを選び、claim-flowを実行時Guardに通して、どのclaimが止まるかを確認できます。</p>
    </header>

    <section class="toolbar">
      <label>
        Profile
        <select id="profileSelect"></select>
      </label>
      <button id="mitigateButton" type="button">Apply PRESENCE Mitigation</button>
      <button id="resetButton" type="button">Reset Profile</button>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Profile Data</h2>
        <dl id="profileSummary" class="summary-list"></dl>
      </article>
      <article class="panel">
        <h2>Runtime Guard</h2>
        <div id="decisionCards" class="stack"></div>
      </article>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Claim Flow</h2>
        <div id="claimFlow" class="flow-list"></div>
      </article>
      <article class="panel">
        <h2>Mitigation Report</h2>
        <pre id="report"></pre>
      </article>
    </section>
  </main>

  <script src="../../presence-sdk-js/src/presence-guard.js"></script>
  <script src="./profiles.js"></script>
  <script src="./main.js"></script>
</body>
</html>
