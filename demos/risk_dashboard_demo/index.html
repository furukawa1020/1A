<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRESENCE Risk Dashboard Demo</title>
  <link rel="stylesheet" href="../shared.css">
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">Reference Profile Demo</p>
      <h1>Manager Dashboard Pattern</h1>
      <p>Public feature patterns are abstracted into claim requests. PRESENCE Guard blocks manager-visible C5/C6 claim flows before rendering.</p>
    </header>

    <section class="grid">
      <article class="panel">
        <h2>Blocked Claim Requests</h2>
        <div id="blockedClaims" class="stack"></div>
      </article>
      <article class="panel">
        <h2>Guard Decisions</h2>
        <pre id="decisionLog"></pre>
      </article>
    </section>
  </main>

  <script src="../../presence-sdk-js/src/presence-guard.js"></script>
  <script src="./main.js"></script>
</body>
</html>
