system:
  name: local_assertive_app
  domain: presenteeism_support
  intended_use:
    - self_observation
  presenteeism_context:
    - still_present_while_unwell
    - self_interpretation_risk
  mandatory_use: false

data:
  signals:
    - keyboard_activity
    - mouse_activity
  processing: local
  retention: session
  identifiability: anonymous
  raw_data_deleted: true

visibility:
  user: true
  manager: false
  teacher: false
  employer: false
  researcher: false
  supporter: false
  evaluator: false

claims:
  - id: c1
    text: "High stress tendency"
    type: psychological
    severity: C4
    source:
      - keyboard_activity
      - mouse_activity

actions:
  - user_notification
  - recommended_break

controls:
  local_processing: true
  raw_data_deleted: true
  user_only: true
  non_assertive_output: false
  opt_out: full
  deletion: full

